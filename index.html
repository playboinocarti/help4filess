<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aiuto File • Converti • Comprimi • Unisci PDF</title>
  <meta name="apple-mobile-web-app-capable" content="yes">

  <!-- librerie -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

  <!-- tuo CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Aiuto File</h1>
    <p class="subtitle">Converti • Comprimi • Unisci PDF</p>

    <div id="toolBar" class="tool-bar">
      <div class="tool-btn active" data-mode="convert">Converti</div>
      <div class="tool-btn" data-mode="compress">Comprimi</div>
      <div class="tool-btn" data-mode="merge">Unisci PDF</div>
    </div>

    <!-- zona drop PC -->
    <div id="dropZone" class="drop-zone">
      <p id="dropText">Trascina file qui o clicca sul bottone</p>
    </div>

    <!-- bottone VERO per Safari iOS -->
    <div class="file-picker-wrapper">
      <label for="fileInput" class="file-btn">
        Seleziona file
      </label>
      <input
        type="file"
        id="fileInput"
        multiple
      />
    </div>

    <!-- LISTA FILE -->
    <div id="fileList" class="file-list"></div>

    <!-- convert CONTROLS -->
    <div id="convertControls" class="controls">
      <div class="control-group">
        <label>Converti in:</label>
        <select id="formatSelect"></select>
      </div>
      <button id="convertBtn" disabled>Converti</button>
    </div>

    <!-- compress CONTROLS -->
    <div id="compressControls" class="controls hidden">
      <button id="compressBtn" disabled>Comprimi tutti</button>
    </div>

    <!-- merge CONTROLS -->
    <div id="mergeControls" class="controls hidden">
      <button id="mergeBtn" disabled>Unisci PDF</button>
    </div>

    <!-- STATUS -->
    <div id="status" class="status">Pronto</div>

    <!-- HELP (solo convert) -->
    <div id="helpSection" class="help-section">
      <h2>Conversioni supportate</h2>
      <div class="conversion-grid">
        <div class="conv-box">DOCX → PDF</div>
        <div class="conv-box">XLSX → PDF</div>
        <div class="conv-box">MP4 → MP3</div>
        <div class="conv-box">PNG ↔ JPG</div>
        <div class="conv-box">Compress. immagini</div>
        <div class="conv-box">Unione PDF</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
